name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write app config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          if (-not '${{ secrets.SUPABASE_URL }}' -or -not '${{ secrets.SUPABASE_ANON_KEY }}') {
            throw "SUPABASE_URL and SUPABASE_ANON_KEY secrets are required for production builds."
          }
          $config = @{
            SUPABASE_URL = '${{ secrets.SUPABASE_URL }}'
            SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}'
          } | ConvertTo-Json -Depth 2
          $config | Out-File -Encoding utf8 build/app-config.json

      - name: Build
        run: npm run build

      - name: Release (Windows)
        run: npx electron-builder --config electron-builder.yml --win nsis portable --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
