appId: com.vibeade.desktop
productName: Vibe-ADE
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - out/**
  - package.json
extraResources:
  - from: build/icon.ico
    to: icon.ico
  - from: .
    to: .
    filter:
      - .env
      - .env.local
asar: true
asarUnpack:
  - node_modules/node-pty/**
npmRebuild: true
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
extraMetadata:
  main: dist/main/index.js
nsis:
  artifactName: ${productName}-${version}-setup-${arch}.${ext}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
portable:
  artifactName: ${productName}-${version}-portable-${arch}.${ext}
publish:
  provider: github
  owner: whothemyst-byte
  repo: Vibe_ADE
